<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolt CRM Lite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <style>:root{--cloud:#F6F8FC;--ink:#19212B;--indigo:#4F46E5;--cyan:#06B6D4;--lime:#A3E635;--coral:#FB7185;--white:#FFFFFF;--line:#D9E0EA;--muted:#667085;--soft-ink:#2C3645;--panel:#FFFFFF;--shadow:0 18px 45px rgba(25,33,43,0.10);--radius:8px;}*{box-sizing:border-box;}html{scroll-behavior:smooth;}body{margin:0;min-height:100vh;color:var(--ink);background:linear-gradient(180deg,rgba(79,70,229,0.06),rgba(6,182,212,0.03) 38%,transparent 70%),var(--cloud);font-family:"Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5;}button,input,select,textarea{font:inherit;}button{cursor:pointer;}a{color:inherit;text-decoration:none;}.shell{width:min(1440px,100%);margin:0 auto;padding:0 24px 36px;}.app-header{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:18px;min-height:76px;margin:0 -24px;padding:14px 24px;background:rgba(246,248,252,0.88);border-bottom:1px solid rgba(217,224,234,0.86);backdrop-filter:blur(18px);}.brand{display:inline-flex;align-items:center;gap:12px;min-width:max-content;}.brand-mark{display:grid;width:40px;height:40px;place-items:center;color:var(--white);background:linear-gradient(135deg,var(--indigo),var(--cyan));border-radius:var(--radius);box-shadow:0 14px 28px rgba(79,70,229,0.26);}.brand-mark svg{width:22px;height:22px;}.brand-copy strong{display:block;font-family:"Manrope",sans-serif;font-size:1.08rem;letter-spacing:0;}.brand-copy span{display:block;color:var(--muted);font-size:0.78rem;font-weight:700;text-transform:uppercase;}.nav-links{display:flex;align-items:center;justify-content:center;gap:6px;padding:4px;background:rgba(255,255,255,0.72);border:1px solid var(--line);border-radius:var(--radius);}.nav-links a{padding:9px 12px;color:var(--soft-ink);border-radius:6px;font-size:0.92rem;font-weight:700;transition:160ms ease;}.nav-links a:hover,.nav-links a:focus-visible{color:var(--indigo);background:rgba(79,70,229,0.08);outline:none;}.header-tools{display:flex;align-items:center;justify-content:flex-end;gap:10px;min-width:320px;}.search-box{position:relative;width:min(320px,100%);}.search-box svg{position:absolute;top:50%;left:13px;width:17px;height:17px;color:var(--muted);transform:translateY(-50%);}.search-box input{width:100%;height:42px;padding:0 12px 0 40px;color:var(--ink);background:var(--white);border:1px solid var(--line);border-radius:var(--radius);outline:none;box-shadow:0 8px 20px rgba(25,33,43,0.04);}.search-box input:focus{border-color:var(--indigo);box-shadow:0 0 0 4px rgba(79,70,229,0.12);}.primary-btn,.icon-btn,.ghost-btn,.action-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:42px;border:0;border-radius:var(--radius);font-weight:800;transition:transform 150ms ease,box-shadow 150ms ease,background 150ms ease;}.primary-btn{padding:0 16px;color:var(--white);background:var(--indigo);box-shadow:0 15px 30px rgba(79,70,229,0.26);}.primary-btn:hover{transform:translateY(-1px);background:#4338CA;}.primary-btn svg,.icon-btn svg,.ghost-btn svg,.action-btn svg{width:18px;height:18px;flex:0 0 auto;}.icon-btn{width:42px;color:var(--ink);background:var(--white);border:1px solid var(--line);}.hamburger{display:none;}.mobile-drawer{position:fixed;inset:0 0 0 auto;z-index:60;width:min(360px,calc(100vw - 36px));padding:18px;background:var(--white);border-left:1px solid var(--line);box-shadow:-18px 0 48px rgba(25,33,43,0.16);transform:translateX(100%);transition:transform 180ms ease;}.mobile-drawer.open{transform:translateX(0);}.drawer-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;}.drawer-links{display:grid;gap:8px;margin-bottom:18px;}.drawer-links a{padding:13px 12px;background:var(--cloud);border:1px solid var(--line);border-radius:var(--radius);font-weight:800;}.drawer-scrim{position:fixed;inset:0;z-index:50;display:none;background:rgba(25,33,43,0.38);}.drawer-scrim.open{display:block;}.hero-workspace{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(330px,0.7fr);gap:20px;padding:28px 0 18px;}.workspace-intro{min-height:234px;padding:28px;color:var(--white);background:linear-gradient(135deg,rgba(25,33,43,0.98),rgba(79,70,229,0.88)),var(--ink);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}.workspace-intro h1{max-width:760px;margin:0 0 12px;font-family:"Manrope",sans-serif;font-size:clamp(2rem,5vw,4.3rem);line-height:1.02;letter-spacing:0;}.workspace-intro p{max-width:720px;margin:0;color:rgba(255,255,255,0.78);font-size:1rem;font-weight:600;}.intro-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px;}.ghost-btn{padding:0 14px;color:var(--white);background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);}.ghost-btn:hover{background:rgba(255,255,255,0.18);transform:translateY(-1px);}.today-panel{padding:22px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}.panel-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;}.panel-title h2,.section-title h2{margin:0;font-family:"Manrope",sans-serif;font-size:1.1rem;letter-spacing:0;}.panel-title span,.section-title p{margin:0;color:var(--muted);font-size:0.88rem;font-weight:600;}.focus-list{display:grid;gap:12px;}.focus-item{display:grid;grid-template-columns:38px minmax(0,1fr) auto;align-items:center;gap:10px;padding:12px;background:var(--cloud);border:1px solid var(--line);border-radius:var(--radius);}.focus-icon{display:grid;width:38px;height:38px;place-items:center;color:var(--ink);background:var(--white);border:1px solid var(--line);border-radius:var(--radius);}.focus-icon svg{width:18px;height:18px;}.focus-item strong{display:block;overflow:hidden;font-size:0.9rem;text-overflow:ellipsis;white-space:nowrap;}.focus-item span{color:var(--muted);font-size:0.8rem;font-weight:700;}.focus-time{color:var(--indigo);font-size:0.78rem;font-weight:800;}.kpi-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;padding:14px 0 8px;}.kpi-card{min-height:132px;padding:18px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 12px 28px rgba(25,33,43,0.06);}.kpi-card header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px;}.kpi-card span{color:var(--muted);font-size:0.82rem;font-weight:800;text-transform:uppercase;}.kpi-card svg{width:20px;height:20px;}.kpi-card strong{display:block;margin-bottom:5px;font-family:"Manrope",sans-serif;font-size:clamp(1.55rem,4vw,2.35rem);line-height:1;letter-spacing:0;}.kpi-card p{margin:0;color:var(--muted);font-size:0.86rem;font-weight:700;}.kpi-card:nth-child(1) svg{color:var(--indigo);}.kpi-card:nth-child(2) svg{color:var(--cyan);}.kpi-card:nth-child(3) svg{color:#65A30D;}.kpi-card:nth-child(4) svg{color:var(--coral);}.section{margin-top:18px;padding:22px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 14px 30px rgba(25,33,43,0.06);}.section-title{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px;}.section-actions{display:flex;align-items:center;gap:8px;}.mini-filter{height:36px;padding:0 11px;color:var(--soft-ink);background:var(--cloud);border:1px solid var(--line);border-radius:var(--radius);font-size:0.84rem;font-weight:800;}.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);}table{width:100%;min-width:860px;border-collapse:collapse;background:var(--white);}th,td{padding:14px 16px;text-align:left;border-bottom:1px solid var(--line);vertical-align:middle;}th{color:var(--muted);background:var(--cloud);font-size:0.76rem;font-weight:900;text-transform:uppercase;}tbody tr{transition:background 150ms ease;}tbody tr:hover{background:rgba(79,70,229,0.04);}tbody tr:last-child td{border-bottom:0;}.contact-cell{display:flex;align-items:center;gap:11px;}.avatar{display:grid;width:38px;height:38px;place-items:center;color:var(--white);background:var(--ink);border-radius:var(--radius);font-weight:900;}.contact-cell strong,.deal-card strong{display:block;color:var(--ink);font-size:0.94rem;line-height:1.2;}.contact-cell span,.deal-card span{color:var(--muted);font-size:0.8rem;font-weight:700;}.badge{display:inline-flex;align-items:center;min-height:26px;padding:0 9px;border-radius:999px;font-size:0.75rem;font-weight:900;}.badge.customer{color:#166534;background:rgba(163,230,53,0.32);}.badge.prospect{color:#075985;background:rgba(6,182,212,0.16);}.badge.partner{color:#5B21B6;background:rgba(79,70,229,0.13);}.badge.risk{color:#9F1239;background:rgba(251,113,133,0.18);}.pipeline-board{display:grid;grid-template-columns:repeat(5,minmax(230px,1fr));gap:12px;overflow-x:auto;padding-bottom:6px;}.pipeline-column{min-height:430px;padding:12px;background:var(--cloud);border:1px solid var(--line);border-radius:var(--radius);}.pipeline-column.drag-over{border-color:var(--indigo);box-shadow:inset 0 0 0 2px rgba(79,70,229,0.18);}.column-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 2px;}.column-head h3{margin:0;font-family:"Manrope",sans-serif;font-size:0.95rem;letter-spacing:0;}.column-head span{color:var(--muted);font-size:0.78rem;font-weight:900;}.deal-list{display:grid;gap:10px;min-height:340px;}.deal-card{padding:13px;background:var(--white);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 8px 18px rgba(25,33,43,0.05);user-select:none;}.deal-card:active{cursor:grabbing;}.deal-card.dragging{opacity:0.5;transform:rotate(1deg);}.deal-meta{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);}.deal-value{font-weight:900;}.probability{color:var(--indigo);font-weight:900;}.progress-track{height:6px;margin-top:10px;overflow:hidden;background:#E7ECF4;border-radius:999px;}.progress-bar{height:100%;background:linear-gradient(90deg,var(--indigo),var(--cyan));border-radius:inherit;}.lower-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,0.56fr);gap:18px;align-items:start;}.timeline{position:relative;display:grid;gap:14px;padding-left:18px;}.timeline::before{position:absolute;top:10px;bottom:10px;left:18px;width:2px;content:"";background:var(--line);}.timeline-item{position:relative;display:grid;grid-template-columns:38px minmax(0,1fr) auto;gap:12px;align-items:start;padding:12px 0 12px 14px;}.timeline-icon{z-index:1;display:grid;width:38px;height:38px;place-items:center;color:var(--white);background:var(--indigo);border:3px solid var(--white);border-radius:var(--radius);box-shadow:0 8px 18px rgba(79,70,229,0.18);}.timeline-icon.email{background:var(--cyan);}.timeline-icon.meeting{background:#65A30D;}.timeline-icon.note{background:var(--coral);}.timeline-icon svg{width:17px;height:17px;}.timeline-body{min-width:0;padding:2px 0;}.timeline-body strong{display:block;font-size:0.95rem;}.timeline-body span{color:var(--muted);font-size:0.84rem;font-weight:700;}.timeline-time{color:var(--muted);font-size:0.78rem;font-weight:900;white-space:nowrap;}.quick-actions{display:grid;gap:10px;}.quick-action{border:1px solid var(--line);border-radius:var(--radius);background:var(--white);overflow:hidden;}.action-btn{width:100%;min-height:54px;justify-content:space-between;padding:0 14px;color:var(--ink);background:var(--white);}.action-btn:hover{background:var(--cloud);}.action-left{display:inline-flex;align-items:center;gap:10px;}.action-left svg{color:var(--indigo);}.action-form{display:none;gap:10px;padding:0 14px 14px;border-top:1px solid var(--line);}.quick-action.open .action-form{display:grid;}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-top:14px;}.field{display:grid;gap:6px;}.field.full{grid-column:1 / -1;}.field label{color:var(--muted);font-size:0.78rem;font-weight:900;text-transform:uppercase;}.field input,.field select,.field textarea{width:100%;min-height:40px;padding:9px 10px;color:var(--ink);background:var(--cloud);border:1px solid var(--line);border-radius:var(--radius);outline:none;}.field textarea{min-height:78px;resize:vertical;}.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(79,70,229,0.12);}.submit-row{display:flex;justify-content:flex-end;gap:8px;}.small-submit{min-height:38px;padding:0 13px;color:var(--white);background:var(--ink);border:0;border-radius:var(--radius);font-size:0.86rem;font-weight:900;}.reports-band{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-top:18px;}.report-card{padding:18px;background:var(--ink);border-radius:var(--radius);color:var(--white);overflow:hidden;}.report-card:nth-child(2){background:var(--indigo);}.report-card:nth-child(3){background:#0E7490;}.report-card span{display:block;color:rgba(255,255,255,0.72);font-size:0.78rem;font-weight:900;text-transform:uppercase;}.report-card strong{display:block;margin:10px 0 8px;font-family:"Manrope",sans-serif;font-size:1.5rem;letter-spacing:0;}.report-card p{margin:0;color:rgba(255,255,255,0.74);font-size:0.88rem;font-weight:600;}.app-footer{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:28px;padding:18px 0 0;color:var(--muted);font-size:0.86rem;font-weight:700;}.footer-links{display:flex;gap:14px;}.toast{position:fixed;right:22px;bottom:22px;z-index:80;display:none;max-width:min(360px,calc(100vw - 32px));padding:14px 16px;color:var(--white);background:var(--ink);border-radius:var(--radius);box-shadow:var(--shadow);font-weight:800;}.toast.show{display:block;animation:slideIn 220ms ease;}@keyframes slideIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}@media (max-width:1180px){.nav-links{display:none;}.hamburger{display:inline-flex;}.hero-workspace,.lower-grid{grid-template-columns:1fr;}.kpi-strip{grid-template-columns:repeat(2,minmax(0,1fr));}}@media (max-width:760px){.shell{padding:0 14px 28px;}.app-header{margin:0 -14px;padding:12px 14px;}.brand-copy span,.header-tools .search-box,.header-tools .primary-btn{display:none;}.header-tools{min-width:0;}.workspace-intro,.today-panel,.section{padding:18px;}.kpi-strip,.reports-band{grid-template-columns:1fr;}.section-title{display:grid;}.timeline-item{grid-template-columns:38px minmax(0,1fr);}.timeline-time{grid-column:2;}.form-grid{grid-template-columns:1fr;}.app-footer{display:grid;}}
</head>
<body>
  <div class="drawer-scrim" data-drawer-close></div>
  <aside class="mobile-drawer" id="mobileDrawer" aria-label="Mobile navigation">
    <div class="drawer-head">
      <a class="brand" href="#top" data-drawer-close>
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M13 2 4 14h7l-1 8 10-13h-7l0-7Z" fill="currentColor"/>
          </svg>
        </span>
        <span class="brand-copy">
          <strong>Bolt CRM Lite</strong>
          <span>Revenue desk</span>
        </span>
      </a>
      <button class="icon-btn" type="button" aria-label="Close menu" data-drawer-close>
        <svg viewBox="0 0 24 24" fill="none">
          <path d="m6 6 12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <nav class="drawer-links">
      <a href="#contacts" data-drawer-close>Contacts</a>
      <a href="#deals" data-drawer-close>Deals</a>
      <a href="#activities" data-drawer-close>Activities</a>
      <a href="#reports" data-drawer-close>Reports</a>
    </nav>
    <button class="primary-btn" type="button" data-toast="New contact workspace opened">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Add Contact
    </button>
  </aside>
  <div class="shell" id="top">
    <header class="app-header">
      <a class="brand" href="#top" aria-label="Bolt CRM Lite home">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M13 2 4 14h7l-1 8 10-13h-7l0-7Z" fill="currentColor"/>
          </svg>
        </span>
        <span class="brand-copy">
          <strong>Bolt CRM Lite</strong>
          <span>Revenue desk</span>
        </span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="#contacts">Contacts</a>
        <a href="#deals">Deals</a>
        <a href="#activities">Activities</a>
        <a href="#reports">Reports</a>
      </nav>
      <div class="header-tools">
        <label class="search-box" aria-label="Search CRM">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="m21 21-4.35-4.35M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input id="crmSearch" type="search" aria-label="Search contacts, companies, and deals" value="" autocomplete="off">
        </label>
        <button class="primary-btn" type="button" data-toast="New contact workspace opened">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Add Contact
        </button>
        <button class="icon-btn hamburger" type="button" aria-label="Open menu" id="drawerOpen">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>
    <main>
      <section class="hero-workspace" aria-labelledby="workspaceTitle">
        <div class="workspace-intro">
          <h1 id="workspaceTitle">Pipeline clarity for compact sales teams.</h1>
          <p>Track every buyer, deal, and next step from one focused CRM board built for fast follow-up, clean handoffs, and daily momentum.</p>
          <div class="intro-actions">
            <button class="ghost-btn" type="button" data-toast="Pipeline report prepared">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M4 19V5M4 19h16M8 16v-5M12 16V8M16 16v-9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              View forecast
            </button>
            <button class="ghost-btn" type="button" data-toast="Daily activity digest queued">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M7 8h10M7 12h6m7 9-4-4H6a3 3 0 0 1-3-3V6a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3v15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Send digest
            </button>
          </div>
        </div>
        <aside class="today-panel" aria-labelledby="todayTitle">
          <div class="panel-title">
            <div>
              <h2 id="todayTitle">Today</h2>
              <span>Priority follow-ups</span>
            </div>
            <span>4 due</span>
          </div>
          <div class="focus-list">
            <article class="focus-item">
              <span class="focus-icon">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.2 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.35 1.9.66 2.81a2 2 0 0 1-.45 2.11L8.05 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.31 1.85.53 2.81.66A2 2 0 0 1 22 16.92Z" stroke="currentColor" stroke-width="2"/>
                </svg>
              </span>
              <div>
                <strong>Renewal call with Aria West</strong>
                <span>Northstar Labs</span>
              </div>
              <span class="focus-time">09:30</span>
            </article>
            <article class="focus-item">
              <span class="focus-icon">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M4 4h16v16H4z" stroke="currentColor" stroke-width="2"/>
                  <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <div>
                <strong>Send pricing recap</strong>
                <span>Helio Systems</span>
              </div>
              <span class="focus-time">11:00</span>
            </article>
            <article class="focus-item">
              <span class="focus-icon">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </span>
              <div>
                <strong>Demo prep with Atlas</strong>
                <span>Atlas Retail Group</span>
              </div>
              <span class="focus-time">14:15</span>
            </article>
          </div>
        </aside>
      </section>
      <section class="kpi-strip" aria-label="CRM metrics">
        <article class="kpi-card">
          <header>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script>
    const drawer = document.querySelector("#mobileDrawer");
    const drawerOpen = document.querySelector("#drawerOpen");
    const drawerScrim = document.querySelector(".drawer-scrim");
    const toast = document.querySelector("#toast");
    let toastTimer;
    function showToast(message) {
      window.clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add("show");
      toastTimer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 2300);
    }
    function closeDrawer() {
      drawer.classList.remove("open");
      drawerScrim.classList.remove("open");
    }
    function openDrawer() {
      drawer.classList.add("open");
      drawerScrim.classList.add("open");
    }
    drawerOpen.addEventListener("click", openDrawer);
    document.querySelectorAll("[data-drawer-close]").forEach((item) => {
      item.addEventListener("click", closeDrawer);
    });
    document.querySelectorAll("[data-toast]").forEach((item) => {
      item.addEventListener("click", () => showToast(item.dataset.toast));
    });
    document.querySelectorAll(".action-btn").forEach((button) => {
      button.addEventListener("click", () => {
        const action = button.closest(".quick-action");
        const isOpen = action.classList.toggle("open");
        button.setAttribute("aria-expanded", String(isOpen));
      });
    });
    const searchInput = document.querySelector("#crmSearch");
    const searchableItems = [
      ...document.querySelectorAll("#contactRows tr"),
      ...document.querySelectorAll(".deal-card")
    ];
    searchInput.addEventListener("input", () => {
      const query = searchInput.value.trim().toLowerCase();
      searchableItems.forEach((item) => {
        const haystack = item.dataset.search || item.textContent.toLowerCase();
        item.style.display = haystack.includes(query) ? "" : "none";
      });
    });
    let draggedCard = null;
    document.querySelectorAll(".deal-card").forEach((card) => {
      card.addEventListener("dragstart", () => {
        draggedCard = card;
        card.classList.add("dragging");
      });
      card.addEventListener("dragend", () => {
        card.classList.remove("dragging");
        draggedCard = null;
        showToast("Deal stage updated");
      });
    });
    document.querySelectorAll(".pipeline-column").forEach((column) => {
      column.addEventListener("dragover", (event) => {
        event.preventDefault();
        column.classList.add("drag-over");
      });
      column.addEventListener("dragleave", () => {
        column.classList.remove("drag-over");
      });
      column.addEventListener("drop", () => {
        column.classList.remove("drag-over");
        const list = column.querySelector(".deal-list");
        if (draggedCard && list) {
          list.appendChild(draggedCard);
        }
      });
    });
  </script>
</body>
</html>
